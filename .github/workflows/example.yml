# Example: scan direct dependencies on every push and PR. Fail on a malicious
# verdict. Copy this into your own repo's .github/workflows/.
name: Lazaretto scan
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jamesdfinance-dev/lazaretto-scan-action@v1
        with:
          api-key: ${{ secrets.LAZARETTO_API_KEY }}
          fail-on: malicious
