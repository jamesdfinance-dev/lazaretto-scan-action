name: Self test

# Manual only: proves the composite action wires inputs -> scan -> verdict in a
# real runner. Uses a trial key stored as a repo secret. fail-on: malicious, so a
# clear/error verdict passes (it will not go red when the trial credits run out).
on:
  workflow_dispatch:

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./
        with:
          api-key: ${{ secrets.LAZARETTO_API_KEY }}
          targets: |
            npm_package:left-pad@1.3.0
          fail-on: malicious
