name: Self test

# Manual only: proves the composite action wires inputs -> scan -> verdict in a
# real runner. Claims its own trial key at runtime (the runner has a fresh IP).
# fail-on: malicious, so a clear/error verdict passes; it will not go red when
# the trial credits run out.
on:
  workflow_dispatch:

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Claim a trial key
        run: |
          key="$(curl -s -X POST https://lazaretto.dev/v1/trial | jq -r '.api_key // empty')"
          if [ -z "$key" ]; then
            echo "::warning::no trial key (rate limited); the action will report only"
          else
            echo "::add-mask::$key"
          fi
          echo "LAZ_KEY=$key" >> "$GITHUB_ENV"
      - uses: ./
        with:
          api-key: ${{ env.LAZ_KEY }}
          targets: |
            npm_package:left-pad@1.3.0
          fail-on: malicious
